<h2>Repayment Tracking</h2>

<p>Total Paid: ₹{{ total_paid }}</p>
<p>Remaining Balance: ₹{{ remaining }}</p>

<form method="POST" action="{{ url_for('add_payment', loan_id=loan.id) }}">
    <input type="number" step="0.01" name="amount_paid" placeholder="Enter Amount" required>
    <button type="submit">Add Payment</button>
</form>

<h3>Payment History</h3>
<ul>
{% for p in payments %}
    <li>
        {{ p.payment_date }} -
        Paid: ₹{{ p.amount_paid }} -
        Remaining: ₹{{ p.remaining_balance }}
    </li>
{% endfor %}
</ul>
