{% extends "base.html" %}
{% block content %}

<h3>Add New Loan</h3>

<form method="POST">

    <input type="text" name="loan_id" placeholder="Loan ID" class="form-control mb-2" required>
    <input type="text" name="loan_type" placeholder="Loan Type" class="form-control mb-2" required>
    <input type="text" name="bank_name" placeholder="Bank Name" class="form-control mb-2" required>
    <input type="number" name="loan_amount" placeholder="Loan Amount" class="form-control mb-2" required>
    <input type="number" step="0.01" name="interest_rate" placeholder="Interest Rate" class="form-control mb-2" required>
    <input type="number" name="tenure_months" placeholder="Tenure (Months)" class="form-control mb-2" required>

    <button class="btn btn-success">Save Loan</button>

</form>

{% endblock %}
