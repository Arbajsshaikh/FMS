<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FMS - Farmers Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f4f9f6;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            position: fixed;
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #0F3D2E, #145A32);
            padding-top: 25px;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
            overflow-y: auto;
        }

        .sidebar h4 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 14px;
            border-radius: 12px;
            margin: 5px 15px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1E8449;
            transform: translateX(4px);
        }

        /* ================= MAIN ================= */
        .main {
            margin-left: 240px;
            min-height: 100vh;
            background: linear-gradient(
                180deg,
                #d7f0e2 0%,
                #e2f5ea 40%,
                #f4fbf7 100%
            );
            position: relative;
        }

        .main::before {
            content: "FMS";
            position: fixed;
            top: 58%;
            left: 65%;
            transform: translate(-50%, -50%);
            font-size: 260px;
            font-weight: 800;
            color: rgba(15, 61, 46, 0.09);
            letter-spacing: 10px;
            pointer-events: none;
            z-index: 0;
        }

        /* ================= HEADER ================= */
        .dashboard-header {
            background:
                linear-gradient(rgba(0, 50, 0, 0.65), rgba(0, 50, 0, 0.65)),
                url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            margin: 20px;
            padding: 70px 40px;
            color: white;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .brand-title {
            font-size: 50px;
            font-weight: 700;
        }

        .brand-subtitle {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Header Buttons */
        .header-buttons {
            position: absolute;
            top: 25px;
            right: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-buttons a {
            background: white;
            color: #145A32;
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-buttons a:hover {
            background: #D4EFDF;
        }

        /* Logout Icon Style */
        .logout-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .logout-btn:hover {
            background: #f8d7da !important;
            color: #c0392b !important;
        }

        /* ================= CONTENT ================= */
        .content {
            padding: 20px 30px 40px 30px;
            position: relative;
            z-index: 1;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main {
                margin-left: 0;
            }
            .header-buttons {
                position: static;
                justify-content: center;
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>🌾 FMS</h4>

    <a href="/land"><i class="bi bi-map"></i> Lands</a>
    <a href="/crops"><i class="bi bi-tree"></i> Crops</a>
    <a href="/operations"><i class="bi bi-tools"></i> Operations</a>
    <a href="/equipment"><i class="bi bi-truck"></i> Equipment</a>
    <a href="/expenses"><i class="bi bi-cash-coin"></i> Expenses</a>
    <a href="/income"><i class="bi bi-graph-up"></i> Income</a>
    <a href="/workers"><i class="bi bi-people"></i> Workers</a>
    <a href="/inventory"><i class="bi bi-box"></i> Inventory</a>
    <a href="/weather"><i class="bi bi-cloud-sun"></i> Weather</a>
    <a href="/loans"><i class="bi bi-bank"></i> Loans</a>
    <a href="/reports"><i class="bi bi-bar-chart"></i> Reports</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="dashboard-header">

        <div class="header-buttons">
            <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/farmer"><i class="bi bi-person-circle"></i> Profile</a>

            <!-- 🔓 Logout Icon Button -->
            <a href="/logout" class="logout-btn" title="Logout">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>

        <div class="brand-title">FMS</div>
        <div class="brand-subtitle">Farmers Management System</div>

    </div>

    <!-- PAGE CONTENT -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
